<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace del Tanteador de Pelota</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; color: #fff; text-align: center; padding: 50px 20px; margin: 0; }
        .box { background: #1a252f; max-width: 400px; margin: 0 auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input[type="password"] { width: 80%; padding: 12px; font-size: 16px; border-radius: 4px; border: 1px solid #34495e; background: #111; color: #fff; margin-bottom: 15px; text-align: center; }
        .btn-link { display: none; width: 85%; margin: 15px auto; padding: 15px; font-size: 16px; font-weight: bold; background: #3498db; color: white; border-radius: 6px; text-decoration: none; border: none; cursor: pointer; }
        .btn-link:hover { background: #2980b9; }
        #err { color: #e74c3c; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔒  Tanteador de Pelota Paleta</h2>
        <p>Introduce la contraseña para desbloquear los enlaces de transmisión:</p>
        <input type="password" id="pass-field" placeholder="••••" oninput="checkAuth()">
        <div id="err">Contraseña Incorrecta</div>
        
        <!-- Real HTML Links that allow middle-click/new-tab natively -->
        <a id="lnk-overlay" class="btn-link" href="overlay.html?auth=7630">🎥 Abrir Overlay de PRISM Video</a>
        <a id="lnk-remote" class="btn-link" href="remote.html?auth=7630" style="background:#2ecc71;">📱 Abrir Panel de Control Móvil</a>
    </div>

    <script>
        function checkAuth() {
            var val = document.getElementById('pass-field').value;
            var err = document.getElementById('err');
            var l1 = document.getElementById('lnk-overlay');
            var l2 = document.getElementById('lnk-remote');
            
            if(val.length >= 4) {
                if(val === "7630") {
                    err.style.display = "none";
                    l1.style.display = "block";
                    l2.style.display = "block";
                    localStorage.setItem('auth_7630', 'true');
                } else {
                    err.style.display = "block";
                    l1.style.display = "none";
                    l2.style.display = "none";
                    localStorage.removeItem('auth_7630');
                }
            }
        }
    </script>
</body>
</html>
