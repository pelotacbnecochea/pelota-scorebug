<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Remote</title>
    <script src="ably.com"></script>
    <style>
        body{font-family:Arial;margin:0;padding:6px;background:#1a252f;color:#fff;box-sizing:border-box}
        .sect{background:#2c3e50;padding:8px;border-radius:6px;margin-bottom:8px}
        h2{margin:0 0 6px 0;font-size:13px;color:#3498db;border-bottom:2px solid #3498db;padding-bottom:2px;text-transform:uppercase}
        .f-row{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap}
        input[type="text"]{padding:8px;border-radius:4px;border:1px solid #34495e;background:#111;color:#fff;font-size:13px;flex-grow:1;min-width:90px;box-sizing:border-box}
        .btn{background:#e74c3c;color:#fff;border:none;padding:10px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;flex-grow:1;text-align:center}
        .btn.active{background:#2ecc71}
        .g-4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:4px}
        .b-grp{background:#111;padding:4px;border-radius:4px;text-align:center;border:1px solid #34495e}
        .b-grp label{display:block;font-size:9px;color:#bdc3c7;margin-bottom:2px;font-weight:bold}
        .g-up{width:100%;height:45px;font-size:20px;font-weight:bold;background:#2ecc71;color:#fff;border:none;border-radius:4px}
        .g-down{width:100%;height:26px;font-size:11px;background:#7f8c8d;color:#fff;border:none;border-radius:4px;margin-top:3px}
        .p-btn{background:#d35400;color:#fff;width:100%;padding:10px;font-size:12px;font-weight:bold;border:none;border-radius:4px;cursor:pointer;margin-top:4px;text-transform:uppercase}
        #pview{background:#111;padding:6px;border-radius:4px;font-size:12px;font-weight:bold;font-family:monospace;border-left:3px solid #d4af37}
    </style>
</head>
<body>
    <div class="sect" style="background:#111;border:1px solid #d4af37">
        <h2>👁️ Live Stream Preview Box</h2>
        <div id="pview">Loading current network state...</div>
    </div>

    <div class="sect" style="background:#27ae60">
        <h2>🎛️ Router</h2>
        <div class="f-row">
            <button class="btn" id="r-sb" onclick="setR('sb')">Scorebug</button>
            <button class="btn" id="r-nx" onclick="setR('nx')">Next Box</button>
            <button class="btn" id="r-hd" onclick="setR('hd')">Hide All</button>
        </div>
        <button class="p-btn" onclick="prom()">💥 Promote Prep to Live (Resets 0-0)</button>
    </div>

    <div class="sect">
        <h2>⚙️ Config</h2>
        <div class="f-row">
            <button class="btn" id="cb-h" onclick="togV('vh')">Header</button>
            <button class="btn" id="cb-tl" onclick="togV('vt')">T-Logo</button>
            <button class="btn" id="cb-d" onclick="togV('vd')">Dropline</button>
        </div>
        <div class="f-row">
            <button class="btn" id="cb-m" onclick="togB('m')">Match</button>
            <button class="btn" id="cb-s1" onclick="togB('s1')">S1</button>
            <button class="btn" id="cb-s2" onclick="togB('s2')">S2</button>
            <button class="btn" id="cb-s3" onclick="togB('s3')">S3</button>
        </div>
        <div class="f-row"><input type="text" id="scale" placeholder="Scale (e.g. 1.0)" oninput="pSc(this.value)"></div>
        <div class="f-row"><input type="text" id="i-hl" placeholder="Head L" oninput="pTx('hl',this.value)"><input type="text" id="i-hr" placeholder="Head R" oninput="pTx('hr',this.value)"></div>
        <div class="f-row"><input type="text" id="i-dl" placeholder="Drop L" oninput="pTx('dl',this.value)"><input type="text" id="i-dr" placeholder="Drop R" oninput="pTx('dr',this.value)"></div>
        <div class="f-row"><input type="text" id="i-tu" placeholder="Tourn Logo URL" oninput="pIm('tu',this.value)"></div>
    </div>

    <div class="sect" style="border-left:4px solid #2ecc71">
        <h2>🟢 Team 1 (Live)</h2>
        <div class="f-row"><input type="text" id="i-t1n" placeholder="T1 Name" oninput="pTx('t1n',this.value)"><input type="text" id="i-t1p" placeholder="Players" oninput="pTx('t1p',this.value)"><button class="btn" id="cb-t1l" onclick="togV('v1')">Logo</button></div>
        <input type="text" id="i-t1l" placeholder="Logo URL" oninput="pIm('t1l',this.value)" style="width:100%;margin-bottom:4px">
        <div class="g-4">
            <div class="b-grp"><label>MATCH</label><button class="g-up" style="background:#d4af37;color:#000" onclick="pPt('t1m',1)">+</button><button class="g-down" onclick="pPt('t1m',-1)">-</button></div>
            <div class="b-grp"><label>SET 1</label><button class="g-up" onclick="pPt('t1s1',1)">+</button><button class="g-down" onclick="pPt('t1s1',-1)">-</button></div>
            <div class="b-grp"><label>SET 2</label><button class="g-up" onclick="pPt('t1s2',1)">+</button><button class="g-down" onclick="pPt('t1s2',-1)">-</button></div>
            <div class="b-grp"><label>SET 3</label><button class="g-up" onclick="pPt('t1s3',1)">+</button><button class="g-down" onclick="pPt('t1s3',-1)">-</button></div>
        </div>
    </div>

    <div class="sect" style="border-left:4px solid #e74c3c">
        <h2>🔴 Team 2 (Live)</h2>
        <div class="f-row"><input type="text" id="i-t2n" placeholder="T2 Name" oninput="pTx('t2n',this.value)"><input type="text" id="i-t2p" placeholder="Players" oninput="pTx('t2p',this.value)"><button class="btn" id="cb-t2l" onclick="togV('v2')">Logo</button></div>
        <input type="text" id="i-t2l" placeholder="Logo URL" oninput="pIm('t2l',this.value)" style="width:100%;margin-bottom:4px">
        <div class="g-4">
            <div class="b-grp"><label>MATCH</label><button class="g-up" style="background:#d4af37;color:#000" onclick="pPt('t2m',1)">+</button><button class="g-down" onclick="pPt('t2m',-1)">-</button></div>
            <div class="b-grp"><label>SET 1</label><button class="g-up" onclick="pPt('t2s1',1)">+</button><button class="g-down" onclick="pPt('t2s1',-1)">-</button></div>
            <div class="b-grp"><label>SET 2</label><button class="g-up" onclick="pPts('t2s2',1)">+</button><button class="g-down" onclick="pPts('t2s2',-1)">-</button></div>
            <div class="b-grp"><label>SET 3</label><button class="g-up" onclick="pPts('t2s3',1)">+</button><button class="g-down" onclick="pPts('t2s3',-1)">-</button></div>
        </div>
    </div>

    <div class="sect" style="border-left:4px solid #e67e22">
        <h2>🟠 Next Match Prep Box</h2>
        <div class="f-row"><input type="text" id="n-hl" placeholder="Next Head L" oninput="sPr()"><input type="text" id="n-hr" placeholder="Next Head R" oninput="sPr()"></div>
        <div class="f-row"><input type="text" id="n-t1n" placeholder="Next T1 Name" oninput="sPr()"><input type="text" id="n-t1p" placeholder="Next T1 Players" oninput="sPr()"></div>
        <div class="f-row"><input type="text" id="n-t2n" placeholder="Next T2 Name" oninput="sPr()"><input type="text" id="n-t2p" placeholder="Next T2 Players" oninput="sPr()"></div>
    </div>

    <script>
        if(localStorage.getItem('auth_7630')!=='true'){document.body.innerHTML='<h1>Denied</h1>';window.location.href='index.html';}
        const ably = new Ably.Realtime('0iWGhA.HcMh0A:p5vD047w2LVWlpn6Ur53ylhokarBgo9wOmEq8EiaLrY');
        const chan = ably.channels.get('p-neco');
        let state = { route:'sb',scale:'1.0',hl:'FPPBA',hr:'Fecha 3',dl:'Necochea',dr:'LIVE',t1n:'Team 1',t1p:'Players 1',t2n:'Team 2',t2p:'Players 2',t1m:0,t1s1:0,t1s2:0,t1s3:0,t2m:0,t2s1:0,t2s2:0,t2s3:0,vh:true,vt:false,vd:true,v1:false,v2:false,bm:true,bs1:true,bs2:true,bs3:true,tu:'',t1l:'',t2l:'',nhl:'FPPBA',nhr:'Proximo',nt1n:'',nt1p:'',nt2n:'',nt2p:'' };
        
        chan.subscribe('u', function(m) { 
            state = m.data; 
            upd(); 
        });
        
        function psh() { chan.publish('u', state); }
        function setR(r) { state.route = r; sPr(); psh(); }
        function pTx(f,v) { state[f]=v; psh(); }
        function pIm(f,v) { state[f]=v; state['v'+(f==='tu'?'t':f==='t1l'?'1':'2')]=true; psh(); }
        function pPt(f,a) { state[f]=Math.max(0, state[f]+a); psh(); }
        function pSc(v) { state.scale = v || '1.0'; psh(); }
        function togV(f) { state[f]=!state[f]; psh(); }
        function togB(b) { state['b'+b]=!state['b'+b]; psh(); }
        function sPr() { state.nhl = document.getElementById('n-hl').value; state.nhr = document.getElementById('n-hr').value; state.nt1n = document.getElementById('n-t1n').value; state.nt1p = document.getElementById('n-t1p').value; state.nt2n = document.getElementById('n-t2n').value; state.nt2p = document.getElementById('n-t2p').value; }
        
        function prom() { 
            sPr(); state.hl = state.nhl; state.hr = state.nhr; state.t1n = state.nt1n || 'Team 1'; state.t1p = state.nt1p || 'Players 1'; state.t2n = state.nt2n || 'Team 2'; state.t2p = state.nt2p || 'Players 2'; state.t1m=0; state.t1s1=0; state.t1s2=0; state.t1s3=0; state.t2m=0; state.t2s1=0; state.t2s2=0; state.t2s3=0; state.nhl='FPPBA'; state.nhr='Proximo'; state.nt1n=''; state.nt1p=''; state.nt2n=''; state.nt2p=''; state.route = 'sb'; psh(); 
            document.getElementById('i-t1n').value = state.t1n; document.getElementById('i-t1p').value = state.t1p; document.getElementById('i-t2n').value = state.t2n; document.getElementById('i-t2p').value = state.t2p; document.getElementById('n-hl').value = ''; document.getElementById('n-hr').value = ''; document.getElementById('n-t1n').value = ''; document.getElementById('n-t1p').value = ''; document.getElementById('n-t2n').value = ''; document.getElementById('n-t2p').value = ''; 
        }
        
        function upd() { 
            let p = document.getElementById('pview');
            if(state.route==='hd') { p.innerText = '[SCREEN EMPTY - ALL HIDDEN]'; }
            else if(state.route==='nx') { p.innerText = 'NEXT MATCH BOX:\n' + (state.nt1n||'TBD') + ' vs ' + (state.nt2n||'TBD'); }
            else { p.innerText = 'SCOREBUG LIVE:\n' + state.t1n + ' [' + state.t1m + '] ' + state.t1s1 + ' ' + state.t1s2 + ' ' + state.t1s3 + '\n' + state.t2n + ' [' + state.t2m + '] ' + state.t2s1 + ' ' + state.t2s2 + ' ' + state.t2s3; }
            
            document.getElementById('r-sb').className = 'btn' + (state.route==='sb'?' active':''); 
            document.getElementById('r-nx').className = 'btn' + (state.route==='nx'?' active':''); 
            document.getElementById('r-hd').className = 'btn' + (state.route==='hd'?' active':''); 
            document.getElementById('cb-h').className = 'btn' + (state.vh?' active':''); 
            document.getElementById('cb-tl').className = 'btn' + (state.vt?' active':''); 
            document.getElementById('cb-d').className = 'btn' + (state.vd?' active':''); 
            document.getElementById('cb-t1l').className = 'btn' + (state.v1?' active':''); 
            document.getElementById('cb-t2l').className = 'btn' + (state.v2?' active':''); 
            document.getElementById('cb-m').className = 'btn' + (state.bm?' active':''); 
            document.getElementById('cb-s1').className = 'btn' + (state.bs1?' active':''); 
            document.getElementById('cb-s2').className = 'btn' + (state.bs2?' active':''); 
            document.getElementById('cb-s3').className = 'btn' + (state.bs3?' active':''); 
        }
    </script>
</body>
</html>
