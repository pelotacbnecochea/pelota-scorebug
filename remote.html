<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelota Remote Panel</title>
    <script src="ably.com"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background: #1a252f; color: #fff; box-sizing: border-box; }
        #remote-panel { max-width: 100%; margin: 0 auto; }
        .sect { background: #2c3e50; padding: 12px; border-radius: 8px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 4px; text-transform: uppercase; }
        h3 { margin: 0 0 8px 0; font-size: 14px; color: #ecf0f1; }
        .f-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
        input[type="text"] { padding: 12px; border-radius: 6px; border: 1px solid #34495e; background: #111; color: white; font-size: 15px; flex-grow: 1; min-width: 120px; box-sizing: border-box; }
        .btn { background: #e74c3c; color: white; border: none; padding: 12px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; flex-grow: 1; text-align: center; }
        .btn.active { background: #2ecc71; }
        .g-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 4px; }
        .b-grp { background: #111; padding: 6px; border-radius: 6px; text-align: center; border: 1px solid #34495e; }
        .b-grp label { display: block; font-size: 10px; color: #bdc3c7; margin-bottom: 4px; font-weight: bold; }
        .g-up { width: 100%; height: 60px; font-size: 24px; font-weight: bold; background: #2ecc71; color: white; border: none; border-radius: 6px; }
        .g-down { width: 100%; height: 35px; font-size: 14px; background: #7f8c8d; color: white; border: none; border-radius: 6px; margin-top: 5px; }
        .promote-btn { background: #d35400; color: white; width: 100%; padding: 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 8px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .promote-btn:active { background: #b34700; }
    </style>
</head>
<body>

    <div id="remote-panel">
        <div class="sect" style="background:#27ae60;">
            <h2>🎛️ Live Screen Router</h2>
            <div class="f-row">
                <button class="btn" id="r-sb" onclick="setRouting('sb')">Show Scorebug</button>
                <button class="btn" id="r-nx" onclick="setRouting('nx')">Show Next Box</button>
                <button class="btn" id="r-hd" onclick="setRouting('hd')">Hide All Layers</button>
            </div>
            <button class="promote-btn" onclick="promotePrepToLive()">💥 Promote Prep Box to Live (Resets to 0-0)</button>
        </div>

        <div class="sect">
            <h2>⚙️ Scorebug Configuration</h2>
            <div class="f-row">
                <button class="btn" id="cb-h" onclick="togVis('vh')">Header</button>
                <button class="btn" id="cb-tl" onclick="togVis('vt')">T-Logo</button>
                <button class="btn" id="cb-d" onclick="togVis('vd')">Dropline</button>
            </div>
            <div class="f-row">
                <button class="btn" id="cb-m" onclick="togBox('m')">Match Box</button>
                <button class="btn" id="cb-s1" onclick="togBox('s1')">Set 1</button>
                <button class="btn" id="cb-s2" onclick="togBox('s2')">Set 2</button>
                <button class="btn" id="cb-s3" onclick="togBox('s3')">Set 3</button>
            </div>
            <div class="f-row"><input type="text" id="scale" placeholder="Size Scale (e.g., 1.0)" oninput="pScale(this.value)"></div>
            <div class="f-row"><input type="text" id="i-hl" placeholder="Header Left" oninput="pTxt('hl',this.value)"><input type="text" id="i-hr" placeholder="Header Right" oninput="pTxt('hr',this.value)"></div>
            <div class="f-row"><input type="text" id="i-dl" placeholder="Drop Left" oninput="pTxt('dl',this.value)"><input type="text" id="i-dr" placeholder="Drop Right" oninput="pTxt('dr',this.value)"></div>
            <div class="f-row"><input type="text" id="i-tu" placeholder="Tournament Logo Image URL" oninput="pImg('tu',this.value)"></div>
        </div>

        <div class="sect" style="border-left:5px solid #2ecc71;">
            <h2>🟢 Team 1 (Live)</h2>
            <div class="f-row"><input type="text" id="i-t1n" placeholder="Team 1 Name" oninput="pTxt('t1n',this.value)"><input type="text" id="i-t1p" placeholder="Players" oninput="pTxt('t1p',this.value)"><button class="btn" id="cb-t1l" onclick="togVis('v1')">Logo</button></div>
            <input type="text" id="i-t1l" placeholder="Logo Image URL" oninput="pImg('t1l',this.value)" style="width:100%; margin-bottom:5px;">
            <div class="g-4">
                <div class="b-grp"><label>MATCH</label><button class="g-up" style="background:#d4af37; color:#000;" onclick="pPts('t1m',1)">+</button><button class="g-down" onclick="pPts('t1m',-1)">-</button></div>
                <div class="b-grp"><label>SET 1</label><button class="g-up" onclick="pPts('t1s1',1)">+</button><button class="g-down" onclick="pPts('t1s1',-1)">-</button></div>
                <div class="b-grp"><label>SET 2</label><button class="g-up" onclick="pPts('t1s2',1)">+</button><button class="g-down" onclick="pPts('t1s2',-1)">-</button></div>
                <div class="b-grp"><label>SET 3</label><button class="g-up" onclick="pPts('t1s3',1)">+</button><button class="g-down" onclick="pPts('t1s3',-1)">-</button></div>
            </div>
        </div>

        <div class="sect" style="border-left:5px solid #e74c3c;">
            <h2>🔴 Team 2 (Live)</h2>
            <div class="f-row"><input type="text" id="i-t2n" placeholder="Team 2 Name" oninput="pTxt('t2n',this.value)"><input type="text" id="i-t2p" placeholder="Players" oninput="pTxt('t2p',this.value)"><button class="btn" id="cb-t2l" onclick="togVis('v2')">Logo</button></div>
            <input type="text" id="i-t2l" placeholder="Logo Image URL" oninput="pImg('t2l',this.value)" style="width:100%; margin-bottom:5px;">
            <div class="g-4">
                <div class="b-grp"><label>MATCH</label><button class="g-up" style="background:#d4af37; color:#000;" onclick="pPts('t2m',1)">+</button><button class="g-down" onclick="pPts('t2m',-1)">-</button></div>
                <div class="b-grp"><label>SET 1</label><button class="g-up" onclick="pPts('t2s1',1)">+</button><button class="g-down" onclick="pPts('t2s1',-1)">-</button></div>
                <div class="b-grp"><label>SET 2</label><button class="g-up" onclick="pPts('t2s2',1)">+</button><button class="g-down" onclick="pPts('t2s2',-1)">-</button></div>
                <div class="b-grp"><label>SET 3</label><button class="g-up" onclick="pPts('t2s3',1)">+</button><button class="g-down" onclick="pPts('t2s3',-1)">-</button></div>
            </div>
        </div>

        <div class="sect" style="border-left:5px solid #e67e22;">
            <h2 style="color:#e67e22;">🟠 Next Match Prep Box</h2>
            <div class="f-row"><input type="text" id="n-hl" placeholder="Next Header Left" oninput="syncPrepInputs()"><input type="text" id="n-hr" placeholder="Next Header Right" oninput="syncPrepInputs()"></div>
            <div class="f-row"><input type="text" id="n-t1n" placeholder="Next Team 1 Name" oninput="syncPrepInputs()"><input type="text" id="n-t1p" placeholder="Next Team 1 Players" oninput="syncPrepInputs()"></div>
            <div class="f-row"><input type="text" id="n-t2n" placeholder="Next Team 2 Name" oninput="syncPrepInputs()"><input type="text" id="n-t2p" placeholder="Next Team 2 Players" oninput="syncPrepInputs()"></div>
        </div>
    </div>

    <script>
        const ably = new Ably.Realtime('0iWGhA.HcMh0A:p5vD047w2LVWlpn6Ur53ylhokarBgo9wOmEq8EiaLrY');
        const chan = ably.channels.get('p-neco');

        let state = {
            route: 'sb', scale: '1.0', hl:'FPPBA', hr:'Fecha 3', dl:'Necochea', dr:'LIVE', t1n:'Team 1', t1p:'Players 1', t2n:'Team 2', t2p:'Players 2',
            t1m:0, t1s1:0, t1s2:0, t1s3:0, t2m:0, t2s1:0, t2s2:0, t2s3:0, vh:true, vt:false, vd:true, v1:false, v2:false, bm:true, bs1:true, bs2:true, bs3:true, tu:'', t1l:'', t2l:'',
            nhl:'FPPBA', nhr:'Proximo', nt1n:'', nt1p:'', nt2n:'', nt2p:''
        };

        // Network connection listener to set baseline form fields once on load
        chan.subscribe('u', function(m) {
            state = m.data;
            chan.unsubscribe(); // Stop listening immediately to prevent phone typing lockups
            updateButtonStylesOnly();
        });

        function psh() { chan.publish('u', state); }
        function setRouting(r) { state.route = r; syncPrepInputs(); psh(); updateButtonStylesOnly(); }
        function pTxt(f,v) { state[f]=v; psh(); }
        function pImg(f,v) { state[f]=v; state['v'+(f==='tu'?'t':f==='t1l'?'1':'2')]=true; psh(); }
        function pPts(f,a) { state[f]=Math.max(0, state[f]+a); psh(); }
        function pScale(v) { state.scale = v || '1.0'; psh(); }
        function togVis(f) { state[f]=!state[f]; psh(); updateButtonStylesOnly(); }
        function togBox(b) { state['b'+b]=!state['b'+b]; psh(); updateButtonStylesOnly(); }
        
        function syncPrepInputs() {
            state.nhl = document.getElementById('n-hl').value; state.nhr = document.getElementById('n-hr').value;
            state.nt1n = document.getElementById('n-t1n').value; state.nt1p = document.getElementById('n-t1p').value;
            state.nt2n = document.getElementById('n-t2n').value; state.nt2p = document.getElementById('n-t2p').value;
        }

        function promotePrepToLive() {
            syncPrepInputs();
            state.hl = state.nhl; state.hr = state.nhr;
            state.t1n = state.nt1n || 'Team 1'; state.t1p = state.nt1p || 'Players 1';
            state.t2n = state.nt2n || 'Team 2'; state.t2p = state.nt2p || 'Players 2';
            state.t1m=0; state.t1s1=0; state.t1s2=0; state.t1s3=0;
            state.t2m=0; state.t2s1=0; state.t2s2=0; state.t2s3=0;
            state.nhl='FPPBA'; state.nhr='Proximo'; state.nt1n=''; state.nt1p=''; state.nt2n=''; state.nt2p='';
            state.route = 'sb';
            psh();
            
            // Wipe input values completely on the remote layout form
            document.getElementById('i-t1n').value = state.t1n; document.getElementById('i-t1p').value = state.t1p;
            document.getElementById('i-t2n').value = state.t2n; document.getElementById('i-t2p').value = state.t2p;
            document.getElementById('n-hl').value = ''; document.getElementById('n-hr').value = '';
            document.getElementById('n-t1n').value = ''; document.getElementById('n-t1p').value = '';
            document.getElementById('n-t2n').value = ''; document.getElementById('n-t2p').value = '';
            updateButtonStylesOnly();
        }

        function updateButtonStylesOnly() {
            document.getElementById('r-sb').className = 'btn' + (state.route==='sb'?' active':'');
            document.getElementById('r-nx').className = 'btn' + (state.route==='nx'?' active':'');
            document.getElementById('r-hd').className = 'btn' + (state.route==='hd'?' active':'');
            document.getElementById('cb-h').className = 'btn' + (state.vh?' active':'');
            document.getElementById('cb-tl').className = 'btn' + (state.vt?' active':'');
            document.getElementById('cb-d').className = 'btn' + (state.vd?' active':'');
            document.getElementById('cb-t1l').className = 'btn' + (state.v1?' active':'');
            document.getElementById('cb-t2l').className = 'btn' + (state.v2?' active':'');
            document.getElementById('cb-m').className = 'btn' + (state.bm?' active':'');
            document.getElementById('cb-s1').className = 'btn' + (state.bs1?' active':'');
            document.getElementById('cb-s2').className = 'btn' + (state.bs2?' active':'');
            document.getElementById('cb-s3').className = 'btn' + (state.bs3?' active':'');
        }
    </script>
</body>
</html>
